services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: myground-navidrome
    restart: unless-stopped
    ports:
      - "${NAVIDROME_PORT}:4533"
    volumes:
      - ${STORAGE_data}:/data
      - ${MUSIC_PATH}:/music:ro
    environment:
      ND_SCANSCHEDULE: "1h"
      ND_LOGLEVEL: "info"
      ND_BASEURL: ""
