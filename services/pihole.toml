[metadata]
name = "Pi-hole"
description = "Network-wide ad blocking and DNS server — block ads for all devices on your network"
icon = "shield"
website = "https://pi-hole.net"
category = "network"
web_path = "/admin/"
post_install_notes = """Admin panel: http://${SERVER_IP}:${PORT}/admin\nAll Tailscale devices using this server as an exit node get ad blocking automatically.\nTo protect your entire network, follow the Pi-hole post-install guide: https://docs.pi-hole.net/main/post-install/\nIf DNS fails, check that port 53 is not used by another service (e.g. systemd-resolved)."""

[[install_variables]]
key = "PIHOLE_PASSWORD"
label = "Admin password"
input_type = "password"
required = true

[defaults]
PIHOLE_PORT = "8086"

[health]
port = 8086
path = "/admin/"
interval_secs = 15

[[storage.volumes]]
name = "pihole_config"
container_path = "/etc/pihole"
description = "Pi-hole configuration and databases"

[[storage.volumes]]
name = "dnsmasq_config"
container_path = "/etc/dnsmasq.d"
description = "DNS resolver configuration"
