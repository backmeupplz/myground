[metadata]
id = "filebrowser"
name = "File Browser"
description = "Web-based file manager with a clean interface for browsing, uploading, and managing files"
icon = "folder"
website = "https://filebrowser.org"
category = "files"

[compose]
template = """
services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: myground-filebrowser
    restart: unless-stopped
    ports:
      - "${FILEBROWSER_PORT}:80"
    volumes:
      - ${STORAGE_data}:/srv
      - ${STORAGE_config}:/config
"""

[defaults]
FILEBROWSER_PORT = "8082"

[health]
port = 8082
path = "/health"
interval_secs = 15

[[storage.volumes]]
name = "data"
container_path = "/srv"
description = "Files served by File Browser"

[[storage.volumes]]
name = "config"
container_path = "/config"
description = "File Browser configuration"
