name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-13
            use_cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Build web UI
        run: cd web && bun install && bun run build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Prepare release asset
        run: |
          BIN="target/${{ matrix.target }}/release/myground"
          ASSET="myground-${{ matrix.target }}"
          cp "$BIN" "$ASSET"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ASSET" > "$ASSET.sha256"
          else
            shasum -a 256 "$ASSET" > "$ASSET.sha256"
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            myground-${{ matrix.target }}
            myground-${{ matrix.target }}.sha256

      - name: Build .deb package
        if: contains(matrix.target, 'linux')
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"

          case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu)  DEB_ARCH="amd64" ;;
            aarch64-unknown-linux-gnu) DEB_ARCH="arm64" ;;
          esac

          PKG_DIR="myground_${VERSION}_${DEB_ARCH}"
          mkdir -p "$PKG_DIR/DEBIAN"
          mkdir -p "$PKG_DIR/usr/bin"
          mkdir -p "$PKG_DIR/usr/lib/systemd/system"
          mkdir -p "$PKG_DIR/usr/share/doc/myground"

          # Control file
          cat > "$PKG_DIR/DEBIAN/control" <<EOF
          Package: myground
          Version: ${VERSION}
          Architecture: ${DEB_ARCH}
          Maintainer: Nikita Kolmogorov <ubuntu@borodutch.com>
          Description: Self-hosting platform — hold your ground
           One Rust binary replaces the big-tech stack. Photos, videos, music,
           files, passwords, DNS — all self-hosted on your machine, accessible
           anywhere, backed up automatically.
          Homepage: https://github.com/backmeupplz/myground
          Depends: docker.io | docker-ce
          Section: admin
          Priority: optional
          EOF
          sed -i 's/^          //' "$PKG_DIR/DEBIAN/control"

          # postinst
          cat > "$PKG_DIR/DEBIAN/postinst" <<'EOF'
          #!/bin/sh
          set -e
          if [ -d /run/systemd/system ]; then
            systemctl daemon-reload
          fi
          EOF
          sed -i 's/^          //' "$PKG_DIR/DEBIAN/postinst"
          chmod 755 "$PKG_DIR/DEBIAN/postinst"

          # postrm
          cat > "$PKG_DIR/DEBIAN/postrm" <<'EOF'
          #!/bin/sh
          set -e
          if [ -d /run/systemd/system ]; then
            systemctl daemon-reload
          fi
          EOF
          sed -i 's/^          //' "$PKG_DIR/DEBIAN/postrm"
          chmod 755 "$PKG_DIR/DEBIAN/postrm"

          # Install files
          cp "target/${{ matrix.target }}/release/myground" "$PKG_DIR/usr/bin/myground"
          cp "myground@.service" "$PKG_DIR/usr/lib/systemd/system/myground@.service"
          cp LICENSE "$PKG_DIR/usr/share/doc/myground/copyright"

          dpkg-deb --build "$PKG_DIR"

      - name: Upload .deb package
        if: contains(matrix.target, 'linux')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.deb"
