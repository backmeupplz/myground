name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths: [website/**]
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install APT repo tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq dpkg-dev gpg

      - name: Import GPG key
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -n "$APT_GPG_PRIVATE_KEY" ]; then
            echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
            echo "allow-preset-passphrase" >> ~/.gnupg/gpg-agent.conf
            gpgconf --kill gpg-agent
            gpgconf --launch gpg-agent
            KEY_ID=$(gpg --list-secret-keys --keyid-format long 2>/dev/null | grep 'sec' | head -1 | sed 's/.*\/\([A-F0-9]*\).*/\1/')
            KEYGRIP=$(gpg --with-keygrip --list-secret-keys "$KEY_ID" | grep Keygrip | head -1 | awk '{print $3}')
            /usr/lib/gnupg/gpg-preset-passphrase --preset --passphrase "$GPG_PASSPHRASE" "$KEYGRIP"
            echo "GPG_READY=true" >> "$GITHUB_ENV"
          fi

      - name: Download .deb packages from latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p website/apt/pool/main
          gh release download --repo backmeupplz/myground --pattern '*.deb' --dir website/apt/pool/main || true
          # Skip APT repo generation if no .deb files found
          if [ -z "$(ls website/apt/pool/main/*.deb 2>/dev/null)" ]; then
            echo "NO_DEBS=true" >> "$GITHUB_ENV"
          fi

      - name: Generate APT repo metadata
        if: env.NO_DEBS != 'true'
        run: |
          cd website/apt

          # Generate Packages files per architecture
          for arch in amd64 arm64; do
            mkdir -p dists/stable/main/binary-${arch}
            dpkg-scanpackages --arch ${arch} pool/main > dists/stable/main/binary-${arch}/Packages
            gzip -k dists/stable/main/binary-${arch}/Packages
          done

          # Generate Release file
          cd dists/stable
          cat > Release <<EOF
          Origin: MyGround
          Label: MyGround
          Suite: stable
          Codename: stable
          Architectures: amd64 arm64
          Components: main
          Description: MyGround self-hosting platform APT repository
          EOF
          sed -i 's/^          //' Release

          # Add checksums
          {
            echo "MD5Sum:"
            find main -name 'Packages*' -exec sh -c 'echo " $(md5sum "$1" | cut -d" " -f1) $(wc -c < "$1") $1"' _ {} \;
            echo "SHA256:"
            find main -name 'Packages*' -exec sh -c 'echo " $(sha256sum "$1" | cut -d" " -f1) $(wc -c < "$1") $1"' _ {} \;
          } >> Release

      - name: Sign APT repo
        if: env.NO_DEBS != 'true' && env.GPG_READY == 'true'
        run: |
          cd website/apt/dists/stable
          gpg --batch --yes --armor --detach-sign -o Release.gpg Release
          gpg --batch --yes --armor --clearsign -o InRelease Release

          # Export public key
          gpg --batch --yes --armor --export > ../../myground.gpg.key

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website
      - id: deployment
        uses: actions/deploy-pages@v4
