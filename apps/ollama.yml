services:
  ollama:
    image: ollama/ollama:latest
    container_name: myground-ollama
    restart: unless-stopped
    ports:
      - "${BIND_IP}:${EXIT_PORT}:11434"
    volumes:
      - ${STORAGE_data}:/root/.ollama
    healthcheck:
      test: curl -f http://localhost:11434/ || exit 1
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 10s
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
