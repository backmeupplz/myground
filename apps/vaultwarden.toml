[metadata]
name = "Vaultwarden"
description = "Lightweight Bitwarden-compatible password manager server — manage passwords securely"
icon = "lock"
website = "https://github.com/dani-garcia/vaultwarden"
category = "security"

[[install_variables]]
key = "ADMIN_TOKEN"
label = "Admin panel token"
input_type = "password"
required = true

[health]
container_port = 80
path = "/alive"
interval_secs = 15

post_install_notes = """Vaultwarden requires HTTPS — the Bitwarden web vault rejects insecure connections. Enable Tailscale or a Cloudflare tunnel in MyGround before using it."""

[[storage.volumes]]
name = "data"
container_path = "/data"
description = "Vaultwarden database and attachments"
