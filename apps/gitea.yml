services:
  gitea:
    image: gitea/gitea:latest
    container_name: myground-gitea
    restart: unless-stopped
    ports:
      - "${BIND_IP}:${EXIT_PORT}:3000"
    volumes:
      - ${STORAGE_data}:/data
    healthcheck:
      test: curl -f http://localhost:3000/api/healthz || exit 1
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 10s
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
