[metadata]
name = "Pi-hole"
description = "Network-wide ad blocking and DNS server — block ads for all devices on your network"
icon = "shield"
website = "https://pi-hole.net"
category = "network"
web_path = "/admin/"
tailscale_mode = "network"
post_install_notes = """Admin panel: http://${SERVER_IP}:${PORT}/admin\nTailscale panel: ${TAILSCALE_URL}/admin\nDNS server address: ${SERVER_IP} (set this as your router's DNS to block ads network-wide).\nTip: assign a static IP to this server in your router so the DNS address doesn't change.\nAll Tailscale devices using this server as an exit node get ad blocking automatically.\nFull setup guide: https://docs.pi-hole.net/main/post-install/"""

[[install_variables]]
key = "PIHOLE_PASSWORD"
label = "Admin password"
input_type = "password"
required = true

[defaults]
PIHOLE_PORT = "8086"

[health]
port = 8086
container_port = 80
path = "/admin/"
interval_secs = 15

[[storage.volumes]]
name = "pihole_config"
container_path = "/etc/pihole"
description = "Pi-hole configuration and databases"

[[storage.volumes]]
name = "dnsmasq_config"
container_path = "/etc/dnsmasq.d"
description = "DNS resolver configuration"
