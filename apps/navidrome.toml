[metadata]
name = "Navidrome"
description = "Modern self-hosted music server and streamer — compatible with Subsonic/Airsonic clients"
icon = "music"
website = "https://www.navidrome.org"
category = "media"

[[install_variables]]
key = "MUSIC_PATH"
label = "Music library path"
input_type = "path"
required = true
default = "/home"

[health]
container_port = 4533
path = "/ping"
interval_secs = 15

[[storage.volumes]]
name = "data"
container_path = "/data"
description = "Navidrome database and cache"
