[metadata]
name = "Prowlarr"
description = "Indexer manager and search proxy for Sonarr, Radarr, and other apps — centralizes torrent and Usenet indexer management"
icon = "search"
website = "https://prowlarr.com"
category = "downloads"
arr_config = true

[[install_variables]]
key = "ARR_USERNAME"
label = "Admin username"
input_type = "text"
required = true
default = "admin"

[[install_variables]]
key = "ARR_PASSWORD"
label = "Admin password"
input_type = "password"
required = true

[health]
container_port = 9696
path = "/ping"
interval_secs = 15

[[storage.volumes]]
name = "config"
container_path = "/config"
description = "Prowlarr database and configuration"
