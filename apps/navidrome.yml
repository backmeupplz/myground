services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: myground-navidrome
    restart: unless-stopped
    ports:
      - "${BIND_IP}:${NAVIDROME_PORT}:4533"
    volumes:
      - ${STORAGE_data}:/data
      - ${MUSIC_PATH}:/music:ro
    healthcheck:
      test: wget -q --spider http://localhost:4533/ || exit 1
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 3s
    environment:
      ND_SCANSCHEDULE: "1h"
      ND_LOGLEVEL: "info"
      ND_BASEURL: ""
