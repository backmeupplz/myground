services:
  beszel:
    image: henrygd/beszel:latest
    container_name: myground-beszel
    restart: unless-stopped
    ports:
      - "${BIND_IP}:${EXIT_PORT}:${EXIT_PORT}"
    command: ["serve", "--http=0.0.0.0:${EXIT_PORT}"]
    volumes:
      - beszel-data:/beszel_data
    environment:
      BESZEL_HUB_USER_EMAIL: "${BESZEL_ADMIN_EMAIL}"
      BESZEL_HUB_USER_PASSWORD: "${BESZEL_ADMIN_PASSWORD}"
    healthcheck:
      test: ["CMD", "/beszel", "health", "--url", "http://localhost:${EXIT_PORT}"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s

  beszel-init:
    image: alpine:latest
    container_name: myground-beszel-init
    depends_on:
      beszel:
        condition: service_healthy
    volumes:
      - beszel-data:/beszel_data:ro
      - agent-data:/agent_data
    environment:
      HUB_PORT: "${EXIT_PORT}"
      ADMIN_EMAIL: "${BESZEL_ADMIN_EMAIL}"
      ADMIN_PASSWORD: "${BESZEL_ADMIN_PASSWORD}"
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        apk add --no-cache curl jq openssh-keygen >/dev/null 2>&1

        if [ -f /agent_data/token ] && [ -f /agent_data/key ]; then exit 0; fi

        HUB="http://beszel:$$HUB_PORT"

        TOKEN=$$(curl -sf "$$HUB/api/collections/users/auth-with-password" \
          -H "Content-Type: application/json" \
          -d "{\"identity\":\"$$ADMIN_EMAIL\",\"password\":\"$$ADMIN_PASSWORD\"}" | jq -r '.token')

        if [ -z "$$TOKEN" ] || [ "$$TOKEN" = "null" ]; then
          echo "Auth failed"; exit 1
        fi

        UNIVERSAL=$$(curl -sf "$$HUB/api/beszel/universal-token?enable=1" \
          -H "Authorization: Bearer $$TOKEN" | jq -r '.token')

        if [ -z "$$UNIVERSAL" ] || [ "$$UNIVERSAL" = "null" ]; then
          echo "Failed to get token"; exit 1
        fi

        echo "$$UNIVERSAL" > /agent_data/token
        ssh-keygen -y -f /beszel_data/id_ed25519 > /agent_data/key
    restart: "no"

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: myground-beszel-agent
    restart: unless-stopped
    network_mode: host
    depends_on:
      beszel-init:
        condition: service_completed_successfully
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - agent-data:/agent_data:ro
    environment:
      LISTEN: "45876"
      KEY_FILE: "/agent_data/key"
      TOKEN_FILE: "/agent_data/token"
      HUB_URL: "http://localhost:${EXIT_PORT}"
      DISABLE_SSH: "true"
      SYSTEM_NAME: "myground"

volumes:
  beszel-data:
  agent-data:
