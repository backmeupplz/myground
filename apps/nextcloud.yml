services:
  nextcloud:
    image: nextcloud:latest
    container_name: myground-nextcloud
    restart: unless-stopped
    ports:
      - "${BIND_IP}:${NEXTCLOUD_PORT}:80"
    volumes:
      - ${STORAGE_data}:/var/www/html
    environment:
      NEXTCLOUD_ADMIN_USER: "${NEXTCLOUD_ADMIN_USER}"
      NEXTCLOUD_ADMIN_PASSWORD: "${NEXTCLOUD_ADMIN_PASSWORD}"
      MYSQL_HOST: nextcloud-db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: "${NEXTCLOUD_DB_PASSWORD}"
      REDIS_HOST: nextcloud-redis
    healthcheck:
      test: curl -f http://localhost:80/ || exit 1
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 10s
    depends_on:
      - nextcloud-db
      - nextcloud-redis

  nextcloud-db:
    image: mariadb:11
    container_name: myground-nextcloud-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${NEXTCLOUD_DB_PASSWORD}"
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: "${NEXTCLOUD_DB_PASSWORD}"
    volumes:
      - ${STORAGE_db_data}:/var/lib/mysql
    healthcheck:
      test: mariadb-admin ping -h localhost -u nextcloud --password=${NEXTCLOUD_DB_PASSWORD} || exit 1
      interval: 10s
      start_period: 30s

  nextcloud-redis:
    image: redis:7-alpine
    container_name: myground-nextcloud-redis
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping || exit 1
