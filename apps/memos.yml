services:
  memos:
    image: neosmemo/memos:stable
    container_name: myground-memos
    restart: unless-stopped
    ports:
      - "${BIND_IP}:${MEMOS_PORT}:5230"
    healthcheck:
      test: wget -q --spider http://localhost:5230/ || exit 1
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s
    volumes:
      - ${STORAGE_data}:/var/opt/memos
