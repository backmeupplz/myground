[metadata]
name = "qBittorrent"
description = "Feature-rich torrent client with a web UI — manage downloads from your browser"
icon = "download"
website = "https://www.qbittorrent.org"
category = "downloads"
[[install_variables]]
key = "DOWNLOADS_PATH"
label = "Downloads path"
input_type = "path"
required = true
default = "/home"

[[install_variables]]
key = "QB_USERNAME"
label = "Admin username"
input_type = "text"
required = true
default = "admin"

[[install_variables]]
key = "QB_PASSWORD"
label = "Admin password"
input_type = "password"
required = true

[defaults]
QBITTORRENT_PORT = "8090"

[health]
port = 8090
container_port = 8080
path = "/api/v2/app/version"
interval_secs = 15

[[storage.volumes]]
name = "config"
container_path = "/config"
description = "qBittorrent configuration and session data"
