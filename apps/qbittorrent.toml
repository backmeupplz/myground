[metadata]
name = "qBittorrent"
description = "Feature-rich torrent client with a web UI — manage downloads from your browser"
icon = "download"
website = "https://www.qbittorrent.org"
category = "downloads"
extra_folders = true
[[install_variables]]
key = "DOWNLOADS_PATH"
label = "Downloads path"
input_type = "path"
required = true
default = "/home"

[[install_variables]]
key = "QB_USERNAME"
label = "Admin username"
input_type = "text"
required = true
default = "admin"

[[install_variables]]
key = "QB_PASSWORD"
label = "Admin password"
input_type = "password"
required = true

vpn_port_forward_command = "/bin/sh -c 'wget -qO- --post-data \"json={\\\"listen_port\\\":{{PORTS}}}\" http://127.0.0.1:8080/api/v2/app/setPreferences 2>/dev/null || true'"

[health]
container_port = 8080
path = "/api/v2/app/version"
interval_secs = 15

[[storage.volumes]]
name = "config"
container_path = "/config"
description = "qBittorrent configuration and session data"
