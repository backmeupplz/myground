services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: myground-jellyfin
    restart: unless-stopped
    ports:
      - "${BIND_IP}:${JELLYFIN_PORT}:8096"
    volumes:
      - ${STORAGE_config}:/config
      - ${MEDIA_PATH}:/media:ro
    healthcheck:
      test: curl -f http://localhost:8096/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 15s
    environment:
      JELLYFIN_PublishedServerUrl: "http://localhost:${JELLYFIN_PORT}"
