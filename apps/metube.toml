[metadata]
name = "MeTube"
description = "Web-based YouTube and video downloader powered by yt-dlp"
icon = "download"
website = "https://github.com/alexta69/metube"
category = "downloads"

[[install_variables]]
key = "DOWNLOAD_PATH"
label = "Download folder"
input_type = "path"
required = true
default = "/home"

[health]
container_port = 8081
path = "/"
interval_secs = 15
