services:
  sonarr:
    image: linuxserver/sonarr:latest
    container_name: myground-sonarr
    restart: unless-stopped
    ports:
      - "${BIND_IP}:${EXIT_PORT}:8989"
    volumes:
      - ${STORAGE_config}:/config
      - ${TV_PATH}:/tv
      - ${DOWNLOADS_PATH}:/downloads
    healthcheck:
      test: curl -f http://localhost:8989/ping || exit 1
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 10s
    environment:
      PUID: "${PUID}"
      PGID: "${PGID}"
      TZ: Etc/UTC
      ARR_USERNAME: "${ARR_USERNAME}"
      ARR_PASSWORD: "${ARR_PASSWORD}"
      ARR_PORT: "8989"
