[metadata]
name = "Radarr"
description = "Movie management and automatic downloading — monitors wanted movies, searches for releases, and integrates with download clients"
icon = "clapperboard"
website = "https://radarr.video"
category = "downloads"
extra_folders = true

[[install_variables]]
key = "MOVIES_PATH"
label = "Movies library path"
description = "Where completed movies are organized — should match your Jellyfin movies library"
input_type = "path"
required = true
default = "/home"
default_from = "jellyfin:MEDIA_PATH"

[[install_variables]]
key = "DOWNLOADS_PATH"
label = "Downloads path"
description = "Must match your qBittorrent downloads path so Radarr can move completed files"
input_type = "path"
required = true
default = "/home"
default_from = "qbittorrent:DOWNLOADS_PATH"

[[install_variables]]
key = "ARR_USERNAME"
label = "Admin username"
input_type = "text"
required = true
default = "admin"

[[install_variables]]
key = "ARR_PASSWORD"
label = "Admin password"
input_type = "password"
required = true

[health]
container_port = 7878
path = "/ping"
interval_secs = 15

[[storage.volumes]]
name = "config"
container_path = "/config"
description = "Radarr database, configuration, and metadata"

[[metadata.link_targets]]
link_type = "download_client"
target_app_ids = ["qbittorrent"]
label = "Download Client"
required_network = true

[[metadata.link_targets]]
link_type = "indexer"
target_app_ids = ["prowlarr"]
label = "Indexer"
required_network = true
