[metadata]
name = "File Browser"
description = "Web-based file manager with a clean interface"
icon = "folder"
website = "https://filebrowser.org"
category = "files"
backup_supported = false

[[install_variables]]
key = "BROWSE_PATH"
label = "Directory to browse"
input_type = "path"
required = true
default = "/home"

[[install_variables]]
key = "FB_USERNAME"
label = "Username"
input_type = "text"
required = true
default = "admin"

[[install_variables]]
key = "FB_PASSWORD"
label = "Password"
input_type = "password"
required = true

[defaults]
FILEBROWSER_PORT = "8082"

[health]
port = 8082
path = "/health"
interval_secs = 15
