services:
  vane:
    image: itzcrazykns1337/vane:latest
    container_name: myground-vane
    restart: unless-stopped
    ports:
      - "${BIND_IP}:${EXIT_PORT}:3000"
    volumes:
      - ${STORAGE_data}:/home/vane/data
    healthcheck:
      test: curl -sf http://localhost:3000/ || exit 1
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 10s
